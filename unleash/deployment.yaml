apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash
  namespace: unleash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unleash
  template:
    metadata:
      labels:
        app: unleash
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: unleash
          image: ghcr.io/jaennil/unleash-server:6
          ports:
            - containerPort: 4242
          env:
            - name: DATABASE_HOST
              value: unleash-postgres-rw
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: unleash
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: unleash-postgres-credentials
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unleash-postgres-credentials
                  key: password
            - name: DATABASE_SSL
              value: "false"
            - name: INIT_ADMIN_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: unleash-credentials
                  key: admin-api-token
          readinessProbe:
            httpGet:
              path: /health
              port: 4242
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
