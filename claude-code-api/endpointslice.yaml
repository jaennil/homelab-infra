apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: claude-code-api
  namespace: claude-code-api
  labels:
    app: claude-code-api
    kubernetes.io/service-name: claude-code-api
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8000
endpoints:
  - addresses:
      - 192.168.3.4
    conditions:
      ready: true
