apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-api
  namespace: claude-code-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-api
  template:
    metadata:
      labels:
        app: claude-code-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: jaennil-pc
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: fix-permissions
          image: busybox
          command:
            - sh
            - -c
            - |
              cd /host-claude
              find . -maxdepth 1 -mindepth 1 ! -name .credentials.json -exec cp -a {} /dest-claude/ \;
              ln -sf /host-claude/.credentials.json /dest-claude/.credentials.json
              chmod -R 777 /dest-claude/
          volumeMounts:
            - name: claude-auth-host
              mountPath: /host-claude
              readOnly: true
            - name: claude-auth
              mountPath: /dest-claude
      containers:
        - name: claude-code-api
          image: ghcr.io/jaennil/life-dashboard/claude-code-api:latest
          env:
            - name: USE_CLAUDE_MAX
              value: "true"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: HTTPS_PROXY
              value: "http://xray.proxy.svc.cluster.local:1081"
            - name: HTTP_PROXY
              value: "http://xray.proxy.svc.cluster.local:1081"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc.cluster.local,.cluster.local,10.0.0.0/8,192.168.0.0/16"
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: claude-auth
              mountPath: /home/claudeuser/.claude
            - name: claude-auth-host
              mountPath: /host-claude
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: claude-auth-host
          hostPath:
            path: /home/jaennil/.claude
            type: Directory
        - name: claude-auth
          emptyDir: {}
