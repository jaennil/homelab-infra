apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-retired.github.io/dashboard
    chart: kubernetes-dashboard
    targetRevision: 7.10.0
    helm:
      values: |
        auth:
          resources:
            requests:
              cpu: 25m
        api:
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 25m
              memory: 256Mi
        web:
          resources:
            requests:
              cpu: 25m
        metricsScraper:
          resources:
            requests:
              cpu: 25m
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
