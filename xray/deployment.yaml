apiVersion: apps/v1
kind: Deployment
metadata:
  name: xray
  namespace: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xray
  template:
    metadata:
      labels:
        app: xray
    spec:
      containers:
        - name: xray
          image: teddysun/xray:1.8.24
          args: ["xray", "run", "-c", "/etc/xray/config.json"]
          ports:
            - containerPort: 1080
              name: socks
            - containerPort: 1081
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/xray/config.json
              subPath: config.json
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: xray-config
